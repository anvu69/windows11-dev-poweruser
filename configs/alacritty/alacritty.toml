# Safe default Alacritty config.
# Start PowerShell 7 first. Switch to WSL after confirming your distro name.

[terminal.shell]
program = "pwsh.exe"
args = ["-NoLogo"]

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "Full"
dynamic_padding = false
startup_mode = "Windowed"

[window.padding]
x = 4
y = 2

[scrolling]
history = 10000

[keyboard]
bindings = [
  { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" }
]