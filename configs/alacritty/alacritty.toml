# Alacritty config for Windows 11 + WSL2 AlmaLinux

[terminal.shell]
program = "wsl.exe"
args = ["-d", "AlmaLinux"]

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "none"
dynamic_padding = false
startup_mode = "Windowed"

[window.padding]
x = 4
y = 2

[scrolling]
history = 10000

[keyboard]
bindings = [
  { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" }
]
