[terminal.shell]
program = "wsl.exe"
args = [
  "-NoLogo",
  "-NoExit",
  "-Command",
  "wsl.exe -d AlmaLinux-9; if ($LASTEXITCODE -ne 0) { Write-Host ''; Write-Host 'WSL failed. Installed distros:' -ForegroundColor Yellow; wsl.exe -l -v }"
]

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[window]
decorations = "Full"
dynamic_padding = false
startup_mode = "Windowed"

[window.padding]
x = 4
y = 2

[scrolling]
history = 10000